{% extends "layout.html" %}

{% block content %}
<h1 class="mb-3">{{ title }}</h1>

<form method="post" class="book-form">
  {% csrf_token %}

  <div class="mb-3">
    <label for="title" class="form-label">Title:</label>
    <input
      type="text"
      class="form-control"
      id="title"
      name="title"
      value="{{ book.title|default:'' }}"
      placeholder="Book title"
      required
    />
  </div>

  <div class="mb-3">
    <label for="author" class="form-label">Author:</label>
    <input
      type="text"
      class="form-control"
      id="author"
      name="author"
      value="{{ book.author|default:'' }}"
      placeholder="Author name"
      required
    />
  </div>

  <div class="mb-3">
    <label for="cover_url" class="form-label">Cover URL:</label>
    <input
      type="url"
      class="form-control"
      id="cover_url"
      name="cover_url"
      value="{{ book.cover_url|default:'' }}"
      placeholder="https://example.com/cover.jpg"
    />
  </div>

  <div class="mb-3">
    <label for="description" class="form-label">Description:</label>
    <textarea
      class="form-control"
      id="description"
      name="description"
      rows="4"
      placeholder="Description"
    >{{ book.description|default:'' }}</textarea>
  </div>

  <div class="mb-3">
    <label for="publication_year" class="form-label">Publication year:</label>
    <input
      type="number"
      class="form-control"
      id="publication_year"
      name="publication_year"
      value="{{ book.publication_year|default:'' }}"
      placeholder="Publication year"
      min="1"
      required
    />
  </div>

  <div class="mb-3">
    <label for="genre" class="form-label">Genre:</label>
    <select class="form-select" id="genre" name="genre" required>
      {% for genre_value, genre_name in genres %}
      <option value="{{ genre_value }}" {% if book.genre == genre_value %}selected{% endif %}>
        {{ genre_name }}
      </option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-3">
    <label for="available_copies" class="form-label">Available copies:</label>
    <input
      type="number"
      class="form-control"
      id="available_copies"
      name="available_copies"
      value="{{ book.available_copies|default:0 }}"
      placeholder="Available copies"
      min="0"
      required
    />
  </div>

  <button type="submit" class="btn btn-primary">{{ button_text }}</button>
  <a href="{% url 'book_admin' %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
